<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generaties van CPU's</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="images/cpu.png" />
  </head>
  <body>
    <header id="topbar">
      <a href="index.html" class="logo">DE<span>CPU</span></a>
      <nav>
        <a href="verantwoording.html">Verantwoording</a>
        <a href="overons.html">Over Ons</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <button
        class="hamburger"
        onclick="this.previousElementSibling.classList.toggle('open')"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div class="page-wrap no-sidebar">
      <main>
        <div class="section-card">
          <div class="section-header">
            <h2>Contact</h2>
          </div>
          <div class="section-body">
            <p>
              Heb je een vraag of opmerking over onze website? Vul het formulier
              in of stuur een e-mail naar
              <a
                href="mailto:filipczubala21@gmail.com"
                style="color: var(--orange2)"
                >filipczubala21@gmail.com</a
              >.
            </p>

            <!-- Gebruik gemaakt van formspree -->
            <form
              action="https://formspree.io/f/mreybvjz"
              method="POST"
              class="contact-form"
            >
              <div class="form-group">
                <label for="naam">Naam</label>
                <input
                  type="text"
                  id="naam"
                  name="naam"
                  placeholder="Jouw naam"
                  required
                />
              </div>
              <div class="form-group">
                <label for="email">E-mailadres</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="jouw@email.com"
                  required
                />
              </div>
              <div class="form-group">
                <label for="bericht">Bericht</label>
                <textarea
                  id="bericht"
                  name="bericht"
                  rows="6"
                  placeholder="Jouw bericht..."
                  required
                ></textarea>
              </div>
              <button type="submit" class="submit-btn">Verstuur bericht</button>
            </form>
          </div>
        </div>
      </main>
    </div>

    <footer>
      Gemaakt voor het vak <strong>Informatica</strong> &nbsp;|&nbsp; Gemaakt
      door: <strong>Tim, Sjors en Filip</strong>
    </footer>
    <!-- Reset na verzending-->
    <script>
      document.querySelector("form").addEventListener("submit", function () {
        setTimeout(() => this.reset(), 100);
      });
    </script>
  </body>
</html>
